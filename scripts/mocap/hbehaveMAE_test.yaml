dataset: mabe_mice

embedsum: false
fast_inference: false
combine_embeddings: false
fusion_head: false

batch_size: 64

# Model parameters
model: gen_hiera
non_hierarchical: false

path_to_data_dir: ""
output_dir: "./output_dir"
log_dir: ""
device: cuda

dist_eval: false
num_workers: 8
pin_mem: true

# Distributed training
world_size: 1
local_rank: -1
dist_on_itp: false
dist_url: "env://"

num_frames: 400
sampling_rate: 1
distributed: false

# hBehaveMAE specific parameters
input_size: [300, 3, 24]
stages: [2, 3, 4]
q_strides:
  - [5, 1, 1]
  - [1, 3, 1]
mask_unit_attn: [true, false, false]
patch_kernel: [3, 1, 24]
init_embed_dim: 128
init_num_heads: 2
out_embed_dims: [32, 64, 96]

fill_holes: false
centeralign: false

no_qkv_bias: false
sep_pos_embed: true
fp32: true