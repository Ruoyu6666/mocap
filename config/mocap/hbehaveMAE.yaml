training:
  batch_size: 128
  epochs: 100
  accum_iter: 1
  start_epoch: 0
  warmup_epochs: 40
  num_workers: 8
  pin_mem: true
  seed: 0
  device: cuda
  clip_grad: null
  fp32: true

data:
  dataset: mocap
  path_to_data_dir: "/home/rguo_hpc/myfolder/code/mocap/data/data_CLB.pkl"
  sliding_window: 1
  fill_holes: false
  data_augment: false
  centeralign: false
  include_test_data: false
  joints3d_procrustes: true

model:
  name: hbehavemae
  non_hierarchical: false

  # masking
  mask_ratio: 0.75
  masking_strategy: random
  decoding_strategy: multi

  # decoder
  decoder_embed_dim: 128
  decoder_depth: 1
  decoder_num_heads: 1

  # temporal
  num_frames: 300
  sampling_rate: 1

  # architecture (hBehaveMAE)
  input_size: [300, 1, 30]
  stages: [2, 3, 4]
  q_strides:
    - [1, 1, 3]
    - [1, 1, 4]
    - [1, 3, 1]
  mask_unit_attn: [true, false, false]
  patch_kernel: [3, 1, 30]
  init_embed_dim: 48
  init_num_heads: 2
  out_embed_dims: [64, 128, 196]

  norm_loss: true
  no_qkv_bias: false
  sep_pos_embed: true
  trunc_init: false

optimizer:
  weight_decay: 0.05
  lr: null
  blr: 0.001
  min_lr: 0.0
  beta: null
  bias_wd: false

logging:
  log_dir: ./log_dir
  output_dir: ./output_dir
  checkpoint_period: 10
  num_checkpoint_del: 20

runtime:
  resume: ""

distributed:
  distributed: false
  world_size: 1
  local_rank: -1
  dist_url: env://
  dist_on_itp: false
  no_env: false