dataset: mabe_mice
model: hbehavemae
non_hierarchical: false

data:
  path_to_data_dir: /home/rguo_hpc/myfolder/code/mocap/data/mabe_mice/mouse_triplet_train.npy
  sampling_rate: 1
  num_frames: 300
  sliding_window: 149
  fill_holes: false
  data_augment: None
  centeralign: false
  include_test_data: false

model:
  # in_chans: 1
  patch_kernel: [3, 1, 24]
  # mlp_ratio: 4
  decoder_embed_dim: 128
  decoder_depth: 1
  decoder_num_heads: 1
  decoding_strategy: multi
  # norm_layer
  norm_loss: true
  
training:
  # masking
  mask_ratio: 0.75
  masking_strategy: random
  
  batch_size: 4
  epochs: 100
  accum_iter: 1


  # architecture (hBehaveMAE)
  input_size: [300, 3, 24]
  stages: [2, 3, 4]
  q_strides:
    - [5, 1, 1]
    - [1, 3, 1]
  mask_unit_attn: [true, false, false]
  init_embed_dim: 128
  init_num_heads: 2
  out_embed_dims: [32, 64, 96]

  norm_loss: true
  no_qkv_bias: false
  sep_pos_embed: true
  trunc_init: false

  start_epoch: 0
  warmup_epochs: 40
  num_workers: 8
  pin_mem: true
  seed: 0
  device: cuda
  clip_grad: null
  fp32: true



optimizer:
  weight_decay: 0.05
  lr: null
  blr: 0.001
  min_lr: 0.0
  beta: null
  bias_wd: false

logging:
  log_dir: ./log_dir
  output_dir: ./output_dir
  checkpoint_period: 20
  num_checkpoint_del: 20

runtime:
  resume: ""

distributed:
  distributed: false
  world_size: 1
  local_rank: -1
  dist_url: env://
  dist_on_itp: false
  no_env: false